<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 400px; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="card p-4 shadow-lg">
            <h2 class="text-center mb-4">Create Account</h2>
            
            <form action="php/register.php" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2">Sign Up</button>
            </form>
            
            <p class="mt-3 text-center">
                Already have an account? <a href="login.html" class="text-decoration-none">Login</a>
            </p>
        </div>
    </div>

</body>
</html>
