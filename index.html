<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Internship Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="card shadow-sm p-5 mx-auto" style="max-width: 500px;">
            <h1 class="display-6 mb-4">Welcome</h1>
            <p class="text-muted mb-4">Please log in to your account or create a new one to manage your profile.</p>
            
            <div class="d-grid gap-3">
                <a href="login.html" class="btn btn-primary btn-lg">Login</a>
                <a href="register.html" class="btn btn-outline-secondary btn-lg">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Check for session in localStorage
        $(document).ready(function() {
            if (localStorage.getItem("session_token")) {
                // If token exists, skip the landing page and go to profile
                window.location.href = "profile.html";
            }
        });
    </script>
</body>
</html>
